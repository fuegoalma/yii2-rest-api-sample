services:
  web:
    build:
      context: .
      target: dev
    image: yii-app:dev
    env_file:
      - .env
    ports:
      - "8084:80"
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html
    networks:
      - yii-network

  # Runs scheduled console commands (see docker/cron/crontab). Reuses the web
  # image (same `image:` name → built once) and the same code mount + env, but
  # its entrypoint runs the cron daemon instead of Apache.
  cron:
    image: yii-app:dev
    build:
      context: .
      target: dev
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html
    entrypoint: ["sh", "/var/www/html/docker/cron/entrypoint.sh"]
    depends_on:
      - db
    networks:
      - yii-network

  # Long-running background worker: continuously processes queued jobs
  # (QueueController::actionListen → DbQueue). Reuses the web image (same
  # `image:` name → built once) + code mount + env; its entrypoint is the
  # worker loop instead of Apache, and it restarts so it stays up.
  worker:
    image: yii-app:dev
    build:
      context: .
      target: dev
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html
    entrypoint: ["php", "yii", "queue/listen"]
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - yii-network

  db:
    image: mysql:8.0
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - yii-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8085:80"
    environment:
      PMA_HOST: db
      PMA_USER: 
      PMA_PASSWORD: 
      UPLOAD_LIMIT: 100M
    depends_on:
      - db
    networks:
      - yii-network

networks:
  yii-network:

volumes:
  db-data: