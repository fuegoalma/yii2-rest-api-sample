name: CD

# Continuous Delivery pipeline. It does NOT run on its own — it chains off CI:
# it only fires after the CI workflow has completed, and it only actually
# builds/deploys when CI finished successfully on the default branch. This is
# the real CI -> CD gate: nothing gets "deployed" unless the tests were green.
on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - master

# Never run two deploys at once; a newer commit cancels the in-flight one.
concurrency:
  group: cd-production
  cancel-in-progress: true

jobs:
  # 1. Build a self-contained, production Docker image from the Dockerfile.
  #    This proves the app containerises and is genuinely deployable — the
  #    image is a real artifact, we just don't push it to a registry here.
  build-image:
    name: Build production image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: prod
          push: false
          load: true
          tags: yii2-rest-api:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the image
        run: |
          docker run --rm --entrypoint php \
            yii2-rest-api:${{ github.event.workflow_run.head_sha }} \
            --version
          echo "✅ Production image built and PHP runtime works."

  # 2. "Deploy" the built image. We don't run a real server (out of scope for
  #    this sample), so the release is simulated — but it goes through a proper
  #    GitHub Environment (production), so it shows up in the repo's
  #    Environments/Deployments tab exactly like a real deploy would.
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-image
    environment:
      name: production
      url: http://localhost:8084

    steps:
      - name: Release image ${{ github.event.workflow_run.head_sha }}
        run: |
          echo "🚀 Deploying commit ${{ github.event.workflow_run.head_sha }} to production"
          echo "   (simulated — no real server is provisioned for this sample project)"

      - name: Post-deploy health check
        run: |
          echo "🩺 Would poll GET /health until it returns {\"status\":\"ok\"}"
          echo "✅ Deployment finished successfully."
